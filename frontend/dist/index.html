<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blogger</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,400;9..144,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="topbar-left">
        <div class="brand-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path d="M12 2L2 7l10 5 10-5-10-5z" fill="url(#tg1)"/>
            <path d="M2 17l10 5 10-5" stroke="url(#tg2)" stroke-width="2" fill="none"/>
            <path d="M2 12l10 5 10-5" stroke="url(#tg2)" stroke-width="2" fill="none"/>
            <defs>
              <linearGradient id="tg1" x1="2" y1="2" x2="22" y2="12">
                <stop stop-color="#6366f1"/><stop offset="1" stop-color="#06b6d4"/>
              </linearGradient>
              <linearGradient id="tg2" x1="2" y1="12" x2="22" y2="22">
                <stop stop-color="#6366f1"/><stop offset="1" stop-color="#06b6d4"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <span class="brand-name">Blogger</span>
      </div>
      <div class="topbar-center"></div>
      <div class="topbar-right">
        <button class="icon-btn" id="toggle-left" aria-label="Toggle reference" title="Toggle reference pane">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
        </button>
        <button class="icon-btn" id="toggle-right" aria-label="Toggle panel" title="Toggle right pane">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="15" y1="3" x2="15" y2="21"/></svg>
        </button>
      </div>
    </header>
    <div class="workspace">
      <div class="pane pane-left" id="pane-left">
        <div class="pane-header">
          <span class="pane-label">Reference</span>
          <div class="url-bar">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
            <input type="text" class="url-input" id="url-input" value="" spellcheck="false">
            <button class="url-go" id="url-go" aria-label="Navigate">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
            </button>
          </div>
        </div>
        <div class="pane-content">
          <iframe id="ref-iframe" src="placeholder.html" sandbox="allow-scripts allow-same-origin allow-popups allow-forms"></iframe>
        </div>
      </div>
      <div class="divider" id="divider-left"></div>
      <div class="pane pane-center" id="pane-center">
        <div class="pane-header">
          <span class="pane-label">Editor</span>
          <span class="pane-label-sub" id="word-count">0 words</span>
        </div>
        <div class="pane-content">
          <div id="editor-container"></div>
        </div>
      </div>
      <div class="divider" id="divider-right"></div>
      <div class="pane pane-right" id="pane-right">
        <div class="pane-header">
          <span class="pane-label">Assistant</span>
          <span class="pane-label-sub ai-model">qwen3.5</span>
        </div>
        <div class="pane-content assistant-pane">
          <div class="assistant-messages" id="assistant-messages"></div>
          <div class="assistant-input-area">
            <div class="assistant-context-toggle">
              <label class="context-check">
                <input type="checkbox" id="include-context" checked>
                <span class="checkmark"></span>
                Include editor content
              </label>
            </div>
            <div class="assistant-input-wrapper">
              <textarea id="assistant-input" placeholder="Ask the assistant..." rows="1"></textarea>
              <button id="assistant-send" aria-label="Send">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M22 2L11 13"/>
                  <path d="M22 2L15 22L11 13L2 9L22 2Z"/>
                </svg>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/15.0.7/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.52.2/min/vs/loader.min.js"></script>
  <script type="module" src="main.js"></script>
</body>
</html>
