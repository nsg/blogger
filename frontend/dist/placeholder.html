<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,500&family=Plus+Jakarta+Sans:wght@400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #141414;
    color: #e0e0e0;
    font-family: "Plus Jakarta Sans", sans-serif;
    overflow: hidden;
    position: relative;
  }

  /* Subtle grain overlay */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    opacity: 0.03;
    background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 10;
  }

  .container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 28px;
    animation: fadeUp 0.8s ease-out both;
    animation-delay: 0.1s;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Main illustration */
  .illustration {
    position: relative;
    width: 160px;
    height: 160px;
  }

  .illustration svg {
    width: 100%;
    height: 100%;
    filter: drop-shadow(0 0 40px rgba(129, 140, 248, 0.08));
  }

  /* Slow breathing glow behind the illustration */
  .glow {
    position: absolute;
    inset: -20px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(129, 140, 248, 0.06) 0%, transparent 70%);
    animation: breathe 5s ease-in-out infinite;
  }

  @keyframes breathe {
    0%, 100% { transform: scale(1); opacity: 0.6; }
    50% { transform: scale(1.15); opacity: 1; }
  }

  /* Floating dots around illustration */
  .dot {
    position: absolute;
    border-radius: 50%;
    animation: drift 6s ease-in-out infinite;
  }

  .dot:nth-child(2) {
    width: 4px; height: 4px;
    background: #818cf8;
    top: 10px; right: 8px;
    animation-delay: 0s;
  }
  .dot:nth-child(3) {
    width: 3px; height: 3px;
    background: #22d3ee;
    bottom: 20px; left: 4px;
    animation-delay: -2s;
  }
  .dot:nth-child(4) {
    width: 2px; height: 2px;
    background: #34d399;
    top: 40px; left: 12px;
    animation-delay: -4s;
  }

  @keyframes drift {
    0%, 100% { transform: translate(0, 0); opacity: 0.5; }
    33% { transform: translate(3px, -5px); opacity: 1; }
    66% { transform: translate(-2px, 3px); opacity: 0.3; }
  }

  /* Text */
  .title {
    font-family: "Fraunces", Georgia, serif;
    font-weight: 300;
    font-size: 22px;
    letter-spacing: -0.01em;
    color: #d4d4d4;
    text-align: center;
  }

  .subtitle {
    font-size: 13px;
    color: #606060;
    text-align: center;
    line-height: 1.5;
    max-width: 260px;
  }

  .spinner {
    margin-top: 4px;
    animation: fadeUp 0.8s ease-out both;
    animation-delay: 0.5s;
  }
</style>
</head>
<body>
  <div class="container">
    <div class="illustration">
      <div class="glow"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <svg viewBox="0 0 160 160" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Open book / pages -->
        <g opacity="0.9">
          <!-- Left page -->
          <path d="M80 55 C80 55, 78 48, 55 45 C32 42, 28 44, 28 44 L28 110 C28 110, 32 108, 55 111 C78 114, 80 120, 80 120 Z"
                fill="#1e1e1e" stroke="#333" stroke-width="1"/>
          <!-- Right page -->
          <path d="M80 55 C80 55, 82 48, 105 45 C128 42, 132 44, 132 44 L132 110 C132 110, 128 108, 105 111 C82 114, 80 120, 80 120 Z"
                fill="#1e1e1e" stroke="#333" stroke-width="1"/>
          <!-- Spine highlight -->
          <path d="M80 55 L80 120" stroke="#818cf8" stroke-width="0.5" opacity="0.4"/>

          <!-- Text lines left page -->
          <g opacity="0.15" stroke="#e0e0e0" stroke-width="1.5" stroke-linecap="round">
            <line x1="40" y1="62" x2="68" y2="60"/>
            <line x1="38" y1="70" x2="72" y2="68"/>
            <line x1="38" y1="78" x2="60" y2="76"/>
            <line x1="38" y1="86" x2="70" y2="84"/>
            <line x1="38" y1="94" x2="55" y2="93"/>
            <line x1="38" y1="102" x2="66" y2="101"/>
          </g>

          <!-- Text lines right page -->
          <g opacity="0.15" stroke="#e0e0e0" stroke-width="1.5" stroke-linecap="round">
            <line x1="92" y1="60" x2="122" y2="62"/>
            <line x1="90" y1="68" x2="120" y2="70"/>
            <line x1="90" y1="76" x2="110" y2="78"/>
            <line x1="90" y1="84" x2="124" y2="86"/>
            <line x1="90" y1="93" x2="108" y2="94"/>
            <line x1="90" y1="101" x2="118" y2="102"/>
          </g>

          <!-- Accent: cursor / editing line on right page -->
          <line x1="90" y1="68" x2="90" y2="74" stroke="#22d3ee" stroke-width="1.5" opacity="0.6">
            <animate attributeName="opacity" values="0.6;0.15;0.6" dur="1.2s" repeatCount="indefinite"/>
          </line>
        </g>

        <!-- Floating pen nib, top-right -->
        <g transform="translate(112, 28) rotate(30)">
          <path d="M0 0 L3 16 L6 0 Z" fill="#818cf8" opacity="0.25"/>
          <line x1="3" y1="16" x2="3" y2="22" stroke="#818cf8" stroke-width="1" opacity="0.15"/>
        </g>
      </svg>
    </div>

    <div class="title">Building site preview</div>
    <div class="subtitle">
      Waiting for Zola to finish building &mdash; this may take a moment on first launch
    </div>
    <div class="spinner">
      <svg width="20" height="20" viewBox="0 0 20 20">
        <circle cx="10" cy="10" r="8" fill="none" stroke="rgba(129,140,248,0.15)" stroke-width="1.5"/>
        <circle cx="10" cy="10" r="8" fill="none" stroke="#818cf8" stroke-width="1.5"
                stroke-dasharray="16 34" stroke-linecap="round">
          <animateTransform attributeName="transform" type="rotate"
                            from="0 10 10" to="360 10 10" dur="1.2s" repeatCount="indefinite"/>
        </circle>
      </svg>
    </div>
  </div>
</body>
</html>
